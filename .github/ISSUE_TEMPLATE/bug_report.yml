name: Bug Report
description: Create a report to help us improve NeuroPace RDNA
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please provide as much specific information as possible.
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I launch CS2, NeuroPace crashes with Error X...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open NeuroPace.exe
        2. Launch Game in Fullscreen
        3. Wait 5 minutes...
    validations:
      required: true
  - type: input
    id: gpu_model
    attributes:
      label: GPU Model
      description: What AMD GPU are you using? (e.g., RX 7800 XT)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Please paste any relevant logs from the Dashboard or console window here.
      render: shell
  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: Windows 10/11 version (e.g., 22H2)
    validations:
      required: true
